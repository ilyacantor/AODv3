[global]
index-url = https://package-proxy.replit.com/pypi/simple
trusted-host = package-proxy.replit.com
cert = /usr/local/share/ca-certificates/envoy-mitmproxy-ca-cert.crt
retries = 2
timeout = 60
# Clear proxy to avoid MITM tunnel failures; relies on Replit package proxy.
proxy =
no-cache-dir = false
