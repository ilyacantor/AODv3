services:
  - type: web
    name: aod-v3
    runtime: python
    plan: starter
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && PYTHONPATH=/opt/render/project/src uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_DB_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FARM_URL
        sync: false
      - key: FARM_SHARED_SECRET
        sync: false
      # --- AAM integration ---
      - key: AAM_URL
        sync: false          # Required for /aam/candidates export; 503 without this
      # --- API auth ---
      - key: AOD_API_KEY
        sync: false          # API key enforced by auth middleware
      # --- Environment / CORS ---
      - key: AOD_ENVIRONMENT
        sync: false          # e.g. "production" — controls environment-specific branching
      - key: AOD_CORS_ORIGINS
        sync: false          # Comma-separated allowed origins; falls back to insecure dev default
      # --- Farm connection tunables ---
      - key: FARM_TIMEOUT
        sync: false
      - key: FARM_RETRIES
        sync: false
      - key: FARM_PROBE_TIMEOUT
        sync: false
      # --- DB pool tunables ---
      - key: DB_POOL_MIN
        sync: false
      - key: DB_POOL_MAX
        sync: false
    healthCheckPath: /api/health
