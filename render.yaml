services:
  - type: web
    name: aos-discover
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: AOS_FARM_URL
        sync: false
    healthCheckPath: /health
