services:
  - type: web
    name: aod-v3
    runtime: python
    plan: starter
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && PYTHONPATH=/opt/render/project/src uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_DB_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FARM_URL
        sync: false
      - key: FARM_SHARED_SECRET
        sync: false
    healthCheckPath: /api/health
