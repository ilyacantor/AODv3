<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AOD Discover{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>AOD Discover v3</h1>
                <p class="subtitle">Enterprise IT Asset Discovery</p>
            </div>
            <nav>
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/triage" class="{% if request.url.path == '/triage' %}active{% endif %}">Triage</a>
                <a href="/catalogs" class="{% if request.url.path == '/catalogs' %}active{% endif %}">Catalogs</a>
            </nav>
        </header>
        
        {% block content %}{% endblock %}
    </div>
    
    <div id="assetModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Asset Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
