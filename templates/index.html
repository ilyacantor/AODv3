<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOD Phase 0 - Presence Debug</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-400: #22D3EE; --cyan-500: #06B6D4; --cyan-600: #0891B2;
            --green-400: #4ADE80; --green-500: #22C55E;
            --amber-400: #FBBF24; --amber-500: #F59E0B;
            --red-400: #F87171; --red-500: #EF4444;
            --slate-400: #94A3B8; --slate-500: #64748B; --slate-700: #334155;
            --slate-800: #1E293B; --slate-900: #0F172A; --slate-950: #020617;
            --gray-700: #374151; --gray-800: #1F2937; --gray-900: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, var(--slate-950) 0%, var(--slate-900) 100%); color: white; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--gray-900); border-bottom: 1px solid var(--gray-800); }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--cyan-600) 0%, var(--amber-500) 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; }
        .logo-text { font-size: 1.5rem; font-weight: 700; color: white; }
        .logo-text span { color: var(--amber-400); }
        .phase-badge { background: var(--amber-500); color: black; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
        .health-status { display: flex; align-items: center; gap: 0.5rem; color: var(--slate-400); font-size: 0.875rem; }
        .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-400); }
        .health-dot.error { background: var(--red-400); }
        main { padding: 2rem; }
        .section { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--slate-700); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .section-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .section.compact { flex: 1; min-width: 300px; max-width: 500px; }
        .section-title { font-size: 1.25rem; font-weight: 600; color: var(--cyan-400); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--slate-400); font-weight: 500; }
        .form-select { width: 100%; padding: 0.75rem 1rem; background: var(--gray-800); border: 1px solid var(--gray-700); border-radius: 8px; color: white; font-family: 'Quicksand', sans-serif; font-size: 1rem; }
        .form-select:focus { outline: none; border-color: var(--cyan-500); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2); }
        .form-select option { background: var(--gray-800); color: white; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--cyan-600); color: white; }
        .btn-primary:hover { background: var(--cyan-500); }
        .btn-primary:disabled { background: var(--slate-700); color: var(--slate-500); cursor: not-allowed; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 2rem; color: var(--slate-400); }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--slate-700); border-top-color: var(--cyan-400); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: var(--red-400); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .success-message { background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: var(--green-400); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .hidden { display: none; }
        .runs-list { margin-top: 1rem; max-height: 320px; overflow-y: auto; }
        .run-item { display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0.75rem; background: var(--slate-800); border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s ease; }
        .run-item:hover { background: var(--gray-800); }
        .run-item.selected { border: 1px solid var(--cyan-500); }
        .run-info { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
        .run-tenant { font-weight: 600; color: var(--cyan-400); }
        .run-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--slate-400); }
        .run-status { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .run-status.completed, .run-status.completed_with_results { background: rgba(34, 197, 94, 0.2); color: var(--green-400); }
        .run-status.completed_no_assets { background: rgba(245, 158, 11, 0.2); color: var(--amber-400); }
        .run-status.failed, .run-status.upstream_error, .run-status.invalid_snapshot { background: rgba(239, 68, 68, 0.2); color: var(--red-400); }
        .config-note { font-size: 0.875rem; color: var(--slate-500); margin-bottom: 1rem; }
        .empty-state { text-align: center; padding: 2rem; color: var(--slate-500); }
        .table-container { overflow-x: auto; }
        .presence-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .presence-table th { text-align: left; padding: 0.75rem; color: var(--slate-400); border-bottom: 2px solid var(--slate-700); font-weight: 600; background: var(--slate-800); }
        .presence-table td { padding: 0.75rem; border-bottom: 1px solid var(--slate-700); }
        .presence-table tr:hover { background: rgba(6, 182, 212, 0.05); }
        .vendor-key { font-weight: 600; color: var(--cyan-400); font-family: monospace; }
        .presence-yes { color: var(--green-400); font-weight: 600; }
        .presence-no { color: var(--slate-500); }
        .timestamp { font-family: monospace; font-size: 0.8rem; color: var(--slate-400); }
        .timestamp.none { color: var(--slate-600); font-style: italic; }
        .run-desc { display: flex; gap: 2rem; margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--slate-800); border-radius: 8px; flex-wrap: wrap; }
        .run-desc-item { display: flex; gap: 0.5rem; align-items: center; }
        .run-desc-label { color: var(--slate-500); font-size: 0.875rem; }
        .run-desc-value { color: var(--cyan-400); font-weight: 600; font-size: 0.875rem; }
        .count-badge { background: var(--cyan-600); color: white; padding: 0.25rem 0.75rem; border-radius: 12px; font-weight: 600; font-size: 0.875rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">A</div>
            <div class="logo-text">AOD <span>Phase 0</span></div>
            <span class="phase-badge">PRESENCE DEBUG</span>
        </div>
        <div class="health-status">
            <div class="health-dot" id="healthDot"></div>
            <span id="healthText">Checking...</span>
        </div>
    </header>
    
    <main class="container">
        <div class="section-row">
            <div class="section compact">
                <h2 class="section-title">Fetch from Farm</h2>
                <p class="config-note">Farm URL configured via environment</p>
                
                <div class="form-group">
                    <label class="form-label">Tenant</label>
                    <select class="form-select" id="tenantSelect" disabled>
                        <option value="">Loading tenants...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Snapshot</label>
                    <select class="form-select" id="snapshotSelect" disabled>
                        <option value="">Select a tenant first</option>
                    </select>
                </div>
                
                <div id="fetchMessage" class="hidden"></div>
                
                <button class="btn btn-primary" id="fetchFromFarm" style="margin-top: 1rem;">Fetch & Run Discovery</button>
            </div>
            
            <div class="section compact">
                <h2 class="section-title">Discovery Runs</h2>
                <div id="runsLoading" class="loading hidden"><div class="spinner"></div>Loading runs...</div>
                <div id="runsList" class="runs-list"><div class="empty-state">No runs yet. Fetch a snapshot to get started.</div></div>
            </div>
        </div>
        
        <div class="section hidden" id="presenceSection">
            <h2 class="section-title">Presence Debug Table</h2>
            <div id="runDesc" class="run-desc">
                <div class="run-desc-item"><span class="run-desc-label">Run ID:</span><span class="run-desc-value" id="descRunId">-</span></div>
            </div>
            <div id="presenceLoading" class="loading hidden"><div class="spinner"></div>Loading presence data...</div>
            <div class="table-container">
                <table class="presence-table" id="presenceTable">
                    <thead>
                        <tr>
                            <th>vendor_key</th>
                            <th>in_discovery</th>
                            <th>in_finance</th>
                            <th>in_idp</th>
                            <th>in_cmdb</th>
                            <th>latest_activity_at</th>
                        </tr>
                    </thead>
                    <tbody id="presenceBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <script>
        let currentRunId = null;
        
        async function checkHealth() {
            try {
                const r = await fetch('/api/health');
                const data = await r.json();
                document.getElementById('healthDot').classList.toggle('error', data.status !== 'healthy');
                document.getElementById('healthText').textContent = data.status === 'healthy' ? `v${data.version}` : 'Error';
            } catch {
                document.getElementById('healthDot').classList.add('error');
                document.getElementById('healthText').textContent = 'Offline';
            }
        }
        
        async function loadTenants() {
            const select = document.getElementById('tenantSelect');
            const msg = document.getElementById('fetchMessage');
            try {
                const r = await fetch('/api/farm/tenants');
                if (!r.ok) {
                    const e = await r.json();
                    throw new Error(e.detail || 'Failed to load tenants');
                }
                const data = await r.json();
                if (data.tenants.length === 0) {
                    select.innerHTML = '<option value="">No tenants found</option>';
                } else {
                    select.innerHTML = '<option value="">Select a tenant...</option>' +
                        data.tenants.map(t => `<option value="${t}">${t}</option>`).join('');
                    select.disabled = false;
                }
            } catch (e) {
                msg.className = 'error-message';
                msg.textContent = e.message;
                msg.classList.remove('hidden');
                select.innerHTML = '<option value="">Failed to load tenants</option>';
            }
        }
        
        async function loadSnapshots() {
            const tenantId = document.getElementById('tenantSelect').value;
            const select = document.getElementById('snapshotSelect');
            const msg = document.getElementById('fetchMessage');
            
            if (!tenantId) {
                select.innerHTML = '<option value="">Select a tenant first</option>';
                select.disabled = true;
                return;
            }
            
            select.disabled = true;
            select.innerHTML = '<option value="">Loading snapshots...</option>';
            
            try {
                const r = await fetch(`/api/farm/snapshots?tenant_id=${encodeURIComponent(tenantId)}`);
                if (!r.ok) {
                    const e = await r.json();
                    throw new Error(e.detail || 'Failed to load snapshots');
                }
                const data = await r.json();
                const snapshots = data.snapshots || [];
                
                if (snapshots.length === 0) {
                    select.innerHTML = '<option value="">No snapshots found</option>';
                } else {
                    const sorted = [...snapshots].sort((a, b) => {
                        const dateA = a.created_at ? new Date(a.created_at) : new Date(0);
                        const dateB = b.created_at ? new Date(b.created_at) : new Date(0);
                        return dateB - dateA;
                    });
                    select.innerHTML = sorted.map((s, i) => {
                        const id = s.snapshot_id || s.id || 'unknown';
                        const created = s.created_at ? new Date(s.created_at).toLocaleString() : '';
                        return `<option value="${id}"${i === 0 ? ' selected' : ''}>${id} - ${created}</option>`;
                    }).join('');
                    select.disabled = false;
                }
                msg.classList.add('hidden');
            } catch (e) {
                msg.className = 'error-message';
                msg.textContent = e.message;
                msg.classList.remove('hidden');
                select.innerHTML = '<option value="">Failed to load snapshots</option>';
            }
        }
        
        async function loadRuns() {
            const loading = document.getElementById('runsLoading');
            const list = document.getElementById('runsList');
            loading.classList.remove('hidden');
            try {
                const r = await fetch('/api/runs');
                let runs = await r.json();
                runs.sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
                if (runs.length === 0) {
                    list.innerHTML = '<div class="empty-state">No runs yet. Fetch a snapshot to get started.</div>';
                } else {
                    list.innerHTML = runs.map(run => `
                        <div class="run-item ${run.run_id === currentRunId ? 'selected' : ''}" data-run-id="${run.run_id}">
                            <div class="run-info">
                                <span class="run-tenant">${run.tenant_id || '-'}</span>
                                <span class="run-status ${run.status}">${run.status.replace(/_/g, ' ')}</span>
                            </div>
                            <div class="run-meta">
                                <span>${run.counts?.assets_admitted || 0} assets</span>
                                <span>${new Date(run.started_at).toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('');
                    document.querySelectorAll('.run-item').forEach(item => {
                        item.addEventListener('click', () => selectRun(item.dataset.runId));
                    });
                }
            } catch {
                list.innerHTML = '<div class="error-message">Failed to load runs</div>';
            } finally {
                loading.classList.add('hidden');
            }
        }
        
        async function selectRun(runId) {
            currentRunId = runId;
            document.querySelectorAll('.run-item').forEach(item => {
                item.classList.toggle('selected', item.dataset.runId === runId);
            });
            document.getElementById('presenceSection').classList.remove('hidden');
            await loadPresence(runId);
        }
        
        async function loadPresence(runId) {
            const loading = document.getElementById('presenceLoading');
            const body = document.getElementById('presenceBody');
            
            loading.classList.remove('hidden');
            document.getElementById('descRunId').textContent = runId;
            
            try {
                const r = await fetch(`/api/debug/presence?run_id=${runId}`);
                if (!r.ok) {
                    const e = await r.json();
                    throw new Error(e.detail || 'Failed to load presence data');
                }
                const data = await r.json();
                
                if (data.rows.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" class="empty-state">No assets in this run</td></tr>';
                } else {
                    body.innerHTML = data.rows.map(row => `
                        <tr>
                            <td class="vendor-key">${escapeHtml(row.vendor_key)}</td>
                            <td class="${row.in_discovery ? 'presence-yes' : 'presence-no'}">${row.in_discovery ? 'YES' : 'no'}</td>
                            <td class="${row.in_finance ? 'presence-yes' : 'presence-no'}">${row.in_finance ? 'YES' : 'no'}</td>
                            <td class="${row.in_idp ? 'presence-yes' : 'presence-no'}">${row.in_idp ? 'YES' : 'no'}</td>
                            <td class="${row.in_cmdb ? 'presence-yes' : 'presence-no'}">${row.in_cmdb ? 'YES' : 'no'}</td>
                            <td class="timestamp ${row.latest_activity_at ? '' : 'none'}">${row.latest_activity_at || 'null'}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                body.innerHTML = `<tr><td colspan="6" class="error-message">${escapeHtml(e.message)}</td></tr>`;
            } finally {
                loading.classList.add('hidden');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('tenantSelect').addEventListener('change', loadSnapshots);
        
        document.getElementById('fetchFromFarm').addEventListener('click', async () => {
            const tenantId = document.getElementById('tenantSelect').value;
            const snapshotId = document.getElementById('snapshotSelect').value;
            const msg = document.getElementById('fetchMessage');
            
            if (!tenantId) {
                msg.className = 'error-message';
                msg.textContent = 'Please select a Tenant';
                msg.classList.remove('hidden');
                return;
            }
            if (!snapshotId) {
                msg.className = 'error-message';
                msg.textContent = 'Please select a Snapshot';
                msg.classList.remove('hidden');
                return;
            }
            
            const btn = document.getElementById('fetchFromFarm');
            btn.disabled = true;
            btn.textContent = 'Fetching...';
            msg.classList.add('hidden');
            
            try {
                const r = await fetch('/api/runs/from-farm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenant_id: tenantId, snapshot_id: snapshotId })
                });
                
                const result = await r.json();
                
                if (!r.ok) {
                    throw new Error(result.detail || 'Farm fetch failed');
                }
                
                msg.className = 'success-message';
                msg.textContent = result.message;
                msg.classList.remove('hidden');
                
                currentRunId = result.run_id;
                await loadRuns();
                await selectRun(result.run_id);
            } catch (e) {
                msg.className = 'error-message';
                msg.textContent = e.message;
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch & Run Discovery';
            }
        });
        
        checkHealth();
        loadRuns();
        loadTenants();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
